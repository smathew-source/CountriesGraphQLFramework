info:
  name: GetCountryByCode
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{base_URL}}"
  body:
    query: |-
      query getCountryCode($code: ID!)
      {
        country(code: $code)
        {
          code
          capital
          currency
          continent{
            name
            code
          }
          languages
          {
            name
          }
        }
      }
    variables: |-
      {
        "code": "{{countryCode}}"
      }
  auth: inherit

