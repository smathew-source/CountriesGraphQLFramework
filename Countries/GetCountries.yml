info:
  name: GetCountries
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{base_URL}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    query: |-
      query {
        countries
        {
        code
        name
        capital
          continent{
            code
            name	
          }
      }
      }
  auth: inherit

