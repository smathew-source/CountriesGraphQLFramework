name: Bruno GraphQL Tests

on:
  push:
    branches:
      - main

jobs:

  run-bruno-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno Tests
        run: bru run --env QA
