name: Bruno API Tests

on:
  push:
  pull_request:

jobs:
  bruno-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Countries GraphQL tests
        run: bru run Countries --env QA --sandbox=developer
